<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRS — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__logo">
        <img src="../../assets/logo.png" alt="RRS Logo" class="auth-card__logo-img" onerror="this.style.display='none'; this.nextSibling.style.display='flex';" />
        <div class="auth-card__logo-fallback" style="display:none; width:44px; height:44px; border-radius:50%; background:var(--color-primary); align-items:center; justify-content:center; font-weight:900; font-size:1rem; color:var(--color-navy);">RRS</div>
        RRS
      </div>

      <h1 class="auth-card__title" id="page-title">Reset your password</h1>
      <p class="auth-card__subtitle" id="page-subtitle" style="margin-bottom:2rem;">Enter your new password below.</p>

      <form id="reset-form" novalidate style="opacity:0; transition:opacity 0.3s;">
        <input type="hidden" id="reset-email" name="email" />
        <input type="hidden" id="reset-token" name="token" />
        
        <div class="auth-form__group">
          <label class="auth-form__label" for="new-password">New Password</label>
          <div class="auth-form__password-wrapper">
            <input class="auth-form__input" type="password" id="new-password" name="password" placeholder="New password (8+ chars)" autocomplete="new-password" />
            <button type="button" class="auth-form__password-toggle" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              <svg viewBox="0 0 24 24"><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
          <p class="auth-form__error-msg" id="password-error"></p>
          <small style="color:var(--color-muted); font-size:0.8rem;">Must be 8+ chars with uppercase, lowercase, number</small>
        </div>

        <p class="auth-form__error-msg" id="form-error"></p>
        <button type="submit" class="auth-form__submit" id="submit-btn">
          Reset Password
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        </button>
      </form>

      <div id="invalid-token" class="error-message" style="display:none; text-align:center; margin:1rem 0; padding:1rem; background:var(--color-error-bg); border-radius:var(--radius); border-left:4px solid var(--color-error);">
        <h3>Invalid or expired reset link</h3>
        <p>Please request a new password reset from the <a href="login.html">login page</a>.</p>
      </div>

      <div id="success-message" style="display:none; text-align:center; margin:2rem 0;">
        <div style="width:60px; height:60px; margin:0 auto 1rem; background:var(--color-success); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; color:white;">✓</div>
        <h2>Password reset successful!</h2>
        <p>Redirecting to login...</p>
        <a href="login.html" class="btn btn--primary" style="margin-top:1rem;">Go to Login</a>
      </div>

      <div class="auth-card__footer">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="../../js/utils.js"></script>
  <script>
    // Get URL params
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    const token = urlParams.get('token');

    const form = document.getElementById('reset-form');
    const invalidToken = document.getElementById('invalid-token');
    const successMsg = document.getElementById('success-message');
    const pageTitle = document.getElementById('page-title');
    const pageSubtitle = document.getElementById('page-subtitle');
    const submitBtn = document.getElementById('submit-btn');

    // Validate params
    if (!email || !token) {
      invalidToken.style.display = 'block';
      form.style.display = 'none';
      pageTitle.textContent = 'Invalid reset link';
      pageSubtitle.textContent = '';
    } else {
      document.getElementById('reset-email').value = email;
      document.getElementById('reset-token').value = token;
      form.style.opacity = '1';
    }

    // Password toggle
    document.querySelector('.auth-form__password-toggle')?.addEventListener('click', (e) => {
      const input = e.target.closest('.auth-form__password-wrapper').querySelector('input');
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
    });

    function clearErrors() {
      document.querySelectorAll('.auth-form__error-msg').forEach(el => {
        el.textContent = '';
        el.classList.remove('auth-form__error-msg--visible');
      });
      document.querySelectorAll('.auth-form__input').forEach(el => el.classList.remove('auth-form__input--error'));
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      const input = document.getElementById('new-password');
      input.classList.add('auth-form__input--error');
      el.textContent = msg;
      el.classList.add('auth-form__error-msg--visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      
      const password = document.getElementById('new-password').value;
      if (password.length < 8) {
        showError('password-error', 'Password must be at least 8 characters');
        return;
      }
      if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
        showError('password-error', 'Must contain uppercase, lowercase, and number');
        return;
      }

      setLoading(submitBtn, true);
      try {
        await apiFetch('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({
            email,
            token,
            password
          })
        });
        
        form.style.display = 'none';
        successMsg.style.display = 'block';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (err) {
        showError('form-error', err.message);
      } finally {
        setLoading(submitBtn, false);
      }
    });
  </script>
</body>
</html>
