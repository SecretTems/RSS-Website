<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRS — Announcements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    /* Announcement expand - bulletproof CSS */
    .announcement-body-details summary {
      cursor: pointer;
      list-style: none;
      font-weight: 600;
      color: var(--color-navy-dark);
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color var(--transition);
    }
    .announcement-body-details summary:hover { color: var(--color-primary); }
    .announcement-body-details summary::-webkit-details-marker { display: none; }
    .announcement-body-details[open] summary::after { content: '↑'; }
    .announcement-body-details summary::after { content: '↓'; font-weight: bold; }
    .announcement-body-details__content {
      max-height: 6em;
      overflow: hidden;
      position: relative;
      line-height: 1.5;
      font-size: 0.88rem;
      color: var(--color-navy-dark);
    }
    .announcement-body-details__content::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2.5em;
      background: linear-gradient(transparent, var(--color-sage));
      pointer-events: none;
    }
    .announcement-body-details[open] .announcement-body-details__content {
      max-height: none;
    }
    .announcement-body-details[open] .announcement-body-details__content::after {
      display: none;
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="announcements" id="announcements-list">
      <div class="empty-state">
        <div class="empty-state__icon">⏳</div>
        <p class="empty-state__text">Loading announcements...</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>© Copyright</span>
    <span>PHINMA Araullo University.</span>
    <span>All Rights Reserved.</span>
  </footer>

  <div class="modal-overlay" id="login-prompt-overlay">
    <div class="modal modal--warning">
      <div class="modal__icon">⚠️</div>
      <h2 class="modal__title">Login Required</h2>
      <p class="modal__text">You need to login before entering.</p>
      <div class="modal__actions">
        <a href="/pages/login.html" class="btn btn--primary btn--full">OK</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="../js/utils.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    injectNavbar('announcements');
    const user = requireAuth();
    const list = document.getElementById('announcements-list');

    async function loadAnnouncements() {
      try {
        const data = await apiFetch('/announcements');
        renderAnnouncements(data.data);
      } catch (err) {
        list.innerHTML = `<div class="empty-state"><div class="empty-state__icon">❌</div><p>${err.message}</p></div>`;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderAnnouncements(items) {
      if (!items?.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📢</div><p>No announcements yet.</p></div>`;
        return;
      }

      list.innerHTML = items.map(ann => {
        const userLiked = user && ann.likes.includes(user.id);
        const userHearted = user && ann.hearts.includes(user.id);
        const contentShort = ann.content.slice(0, 250) + (ann.content.length > 250 ? '...' : '');
        const needsExpand = ann.content.length > 250 || ann.content.split(/\\n/).length > 4;
        
        return `
          <article class="announcement-card" data-id="${ann._id}">
            <div class="announcement-card__header">
              <div style="display:flex;gap:0.5rem;align-items:center;flex:1;">
                ${ann.author.profilePhoto ? `<img src="${ann.author.profilePhoto}" alt="${escapeHtml(ann.author.username)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;">` : ''}
                <div>
                  <h2 class="announcement-card__title">${escapeHtml(ann.title)}</h2>
                  <span class="announcement-card__date">${escapeHtml(ann.author.username)} • ${formatDate(ann.createdAt)}</span>
                </div>
              </div>
            </div>
            ${needsExpand ? `
              <details class="announcement-body-details">
                <summary>View full announcement</summary>
                <div class="announcement-body-details__content" style="white-space: pre-line;">${ann.content.replace(/\\\\n/g, '\n')}</div>
              </details>
            ` : `
              <div class="announcement-card__body" style="white-space: pre-line; font-size:0.88rem; color:var(--color-navy-dark); line-height:1.5;">${ann.content.replace(/\\\\n/g, '\n')}</div>
            `}
            <div class="announcement-card__footer">
              <button class="announcement-card__action ${userLiked ? 'announcement-card__action--liked' : ''}" data-action="like" data-id="${ann._id}">
                👍 <span class="like-count">${ann.likes.length}</span>
              </button>
              <button class="announcement-card__action ${userHearted ? 'announcement-card__action--hearted' : ''}" data-action="heart" data-id="${ann._id}">
                ❤️ <span class="heart-count">${ann.hearts.length}</span>
              </button>
              <button class="announcement-card__action" onclick="toggleDetails('${ann._id}');return false;" title="View comments (${ann.comments.length})">
                💬 <span>${ann.comments.length}</span>
              </button>
            </div>
            <div class="announcement-details" id="details-${ann._id}" style="display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.1);">
              <div id="comments-${ann._id}" class="comments-list"></div>
              ${user ? `<div class="comment-form" style="display:flex;gap:.5rem;margin-top:1rem;">
                <textarea id="comment-text-${ann._id}" placeholder="Add a comment..." maxlength="500" style="flex:1;padding:.6rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--radius-sm);color:var(--color-white);resize:none;"></textarea>
                <button onclick="addComment('${ann._id}',event)" class="btn btn--primary" style="padding:.4rem .8rem;font-size:.85rem;">Comment</button>
              </div>` : ''}
            </div>
          </article>
        `;
      }).join('');
    }

    // Interactions
    list.addEventListener('click', async (e) => {
      e.stopPropagation();
      const btn = e.target.closest('[data-action]');
      if (btn && user) {
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        try {
          const data = await apiFetch(`/announcements/${id}/${action}`, { method: 'PATCH' });
          btn.querySelector('span').textContent = data.likes ?? data.hearts;
          btn.classList.toggle(`announcement-card__action--${action === 'like' ? 'liked' : 'hearted'}`);
        } catch (err) {
          showToast(err.message, 'error');
        }
      }
    });

    window.toggleDetails = id => {
      const details = document.getElementById(`details-${id}`);
      details.style.display = details.style.display === 'none' ? 'block' : 'none';
    };

    window.addComment = async (id, e) => {
      e.stopPropagation();
      const text = document.getElementById(`comment-text-${id}`).value.trim();
      if (!text) return showToast('Comment required', 'error');
      try {
        await apiFetch(`/announcements/${id}/comments`, {
          method: 'POST',
          body: JSON.stringify({ text })
        });
        document.getElementById(`comment-text-${id}`).value = '';
        loadComments(id);
        showToast('Comment added!');
      } catch (err) {
        showToast(err.message, 'error');
      }
    };

    async function loadComments(id) {
      try {
        const data = await apiFetch(`/announcements/${id}/comments`);
        const container = document.getElementById(`comments-${id}`);
        if (!data.data.length) {
          container.innerHTML = '<p style="opacity:.6;text-align:center;">No comments yet.</p>';
        } else {
          container.innerHTML = data.data.map(c => `
            <div style="padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.1);">
              <div style="display:flex;gap:.5rem;margin-bottom:.5rem;align-items:center;">
                ${c.author.profilePhoto ? `<img src="${c.author.profilePhoto}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">` : ''}
                <strong>${escapeHtml(c.author.username)}</strong>
                <small style="opacity:.6;">${new Date(c.createdAt).toLocaleString()}</small>
              </div>
              <p>${escapeHtml(c.text)}</p>
            </div>
          `).join('');
        }
      } catch {
        document.getElementById(`comments-${id}`).innerHTML = '<p>Error loading comments.</p>';
      }
    }

    loadAnnouncements();
  </script>
</body>
</html>
