<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRS — Announcements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <main class="page">
    <div class="announcements" id="announcements-list">
      <div class="empty-state">
        <div class="empty-state__icon">⏳</div>
        <p class="empty-state__text">Loading announcements...</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>© Copyright</span>
    <span>PHINMA Araullo University.</span>
    <span>All Rights Reserved.</span>
  </footer>

  <div class="modal-overlay" id="login-prompt-overlay">
    <div class="modal modal--warning">
      <div class="modal__icon">⚠️</div>
      <h2 class="modal__title">Login Required</h2>
      <p class="modal__text">You need to login before entering.</p>
      <div class="modal__actions">
        <a href="/pages/login.html" class="btn btn--primary btn--full">OK</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="../js/utils.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    injectNavbar('announcements');
    const user = requireAuth();
    const list = document.getElementById('announcements-list');

    async function loadAnnouncements() {
      try {
        const data = await apiFetch('/announcements');
        renderAnnouncements(data.data);
        setTimeout(() => initAnnouncementToggles(), 150);
      } catch (err) {
        list.innerHTML = `<div class="empty-state"><div class="empty-state__icon">❌</div><p>${err.message}</p></div>`;
      }
    }

    function renderAnnouncements(items) {
      if (!items?.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📢</div><p>No announcements yet.</p></div>`;
        return;
      }

      list.innerHTML = items.map(ann => {
        const userLiked = user && ann.likes.includes(user.id);
        const userHearted = user && ann.hearts.includes(user.id);
        return `
          <article class="announcement-card" data-id="${ann._id}">
            <div class="announcement-card__header">
              <div style="display:flex;gap:0.5rem;align-items:center;">
                ${ann.author.profilePhoto ? `<img src="${ann.author.profilePhoto}" alt="${escapeHtml(ann.author.username)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">` : ''}
                <div>
                  <h2 class="announcement-card__title">${escapeHtml(ann.title)}</h2>
${escapeHtml(ann.author?.username || 'Deleted User')} • ${formatDate(ann.createdAt)}</span>
                </div>
              </div>
            </div>
            <div class="announcement-card__body" data-full-content="${escapeHtml(ann.content)}">${formatAnnouncementContent(ann.content)}</div>
            <div class="announcement-card__footer">
              <button class="announcement-card__action ${userLiked ? 'announcement-card__action--liked' : ''}" data-action="like" data-id="${ann._id}">
                👍 <span class="like-count">${ann.likes.length}</span>
              </button>
              <button class="announcement-card__action ${userHearted ? 'announcement-card__action--hearted' : ''}" data-action="heart" data-id="${ann._id}">
                ❤️ <span class="heart-count">${ann.hearts.length}</span>
              </button>
              <button class="announcement-card__action" onclick="toggleDetails('${ann._id}')" title="Comments (${ann.comments.length})">
                💬 <span>${ann.comments.length}</span>
              </button>
            </div>
            <div class="announcement-details" id="details-${ann._id}" style="display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.1);">
              <div id="comments-${ann._id}"></div>
              ${user ? `<div class="comment-form" style="display:flex;gap:.5rem;margin-top:1rem;">
                <textarea id="comment-text-${ann._id}" placeholder="Add comment..." maxlength="500" style="flex:1;padding:.6rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--radius-sm);color:var(--color-white);resize:vertical;"></textarea>
                <button onclick="addComment('${ann._id}',event)" class="btn btn--primary" style="padding:.4rem .8rem;white-space:nowrap;">Post</button>
              </div>` : ''}
            </div>
          </article>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatAnnouncementContent(content) {
      return content.replace(/\\\\n/g, '<br>').replace(/&/g, '&amp;').replace(/</g, '<').replace(/>/g, '>');
    }

    function initAnnouncementToggles() {
      document.querySelectorAll('.announcement-card__body').forEach(body => {
        const fullContent = body.dataset.fullContent;
        const lineCount = fullContent.split(/<br>/).length;
        if (lineCount > 5 || fullContent.length > 300) {
          body.classList.add('announcement-card__body--long');
          const btn = document.createElement('button');
          btn.className = 'ann-view-more-btn';
          btn.textContent = 'View more ↓';
          btn.style.margin = '1rem auto 0';
          btn.style.display = 'block';
          btn.onclick = (e) => {
            e.stopPropagation();
            toggleAnnContent(btn);
          };
          const footer = body.parentNode.querySelector('.announcement-card__footer');
          footer.insertAdjacentElement('beforebegin', btn);

        }
      });
    }

    function toggleAnnContent(btn) {
      const wrapper = btn.parentNode;
      const body = wrapper.querySelector('.announcement-card__body');
      
      if (body.classList.contains('announcement-card__body--expanded')) {
        body.classList.remove('announcement-card__body--expanded');
        body.innerHTML = formatAnnouncementContent(body.dataset.fullContent.slice(0, 300)) + '...';
        btn.textContent = 'View more ↓';
      } else {
        body.classList.add('announcement-card__body--expanded');
        body.innerHTML = formatAnnouncementContent(body.dataset.fullContent);
        btn.textContent = 'View less ↑';
      }
    }

    // Global interactions
    list.onclick = async e => {
      const actionBtn = e.target.closest('[data-action]');
      if (actionBtn && user) {
        const action = actionBtn.dataset.action;
        const id = actionBtn.dataset.id;
        try {
          const data = await apiFetch(`/announcements/${id}/${action}`, {method: 'PATCH'});
          actionBtn.querySelector('span').textContent = data.likes ?? data.hearts;
          actionBtn.classList.toggle(`announcement-card__action--${action === 'like' ? 'liked' : 'hearted'}`);
        } catch(err) {
          showToast(err.message, 'error');
        }
        return;
      }
    };

    window.toggleDetails = id => {
      const details = document.getElementById(`details-${id}`);
      const showing = details.style.display === 'none';
      details.style.display = showing ? 'block' : 'none';
      if (showing && !document.getElementById(`comments-${id}`).children.length) {
        loadComments(id);
      }
    };


    window.addComment = async (id, e) => {
      e.stopPropagation();
      const textarea = document.getElementById(`comment-text-${id}`);
      const text = textarea.value.trim();
      if (!text) return showToast('Enter comment', 'error');
      try {
        await apiFetch(`/announcements/${id}/comments`, {
          method: 'POST',
          body: JSON.stringify({text})
        });
        textarea.value = '';
        loadComments(id);
        showToast('Posted!');
      } catch(err) {
        showToast(err.message, 'error');
      }
    };

    async function loadComments(id) {
      try {
        const data = await apiFetch(`/announcements/${id}/comments`);
        const container = document.getElementById(`comments-${id}`);
        container.innerHTML = data.data.length ? data.data.map(c => `
          <div style="padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.08);">
            <div style="display:flex;gap:.4rem;align-items:center;margin-bottom:.3rem;">
              ${c.author?.profilePhoto ? `<img src="${c.author.profilePhoto}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;">` : ''}
              <strong>${escapeHtml(c.author?.username || 'Deleted User')}</strong>
              <small style="opacity:.6;margin-left:.2rem;">${new Date(c.createdAt).toLocaleString()}</small>
            </div>
            <p style="margin:0 .2rem 0 0;">${escapeHtml(c.text)}</p>
            ${getIsAdmin() ? `<button onclick="deleteComment('${id}', '${c._id}')" style="float:right;background:none;border:none;color:var(--color-red);font-size:1.1rem;cursor:pointer;padding:.2rem;">🗑️</button>` : ''}
          </div>
        `).join('') : '<p style="opacity:.6;text-align:center;">No comments</p>';
      } catch (err) {
        document.getElementById(`comments-${id}`).innerHTML = '<p>Error loading</p>';
      }
    }

    window.deleteComment = async (annId, cid) => {
      if (!confirm('Delete this comment permanently?')) return;
      try {
        await apiFetch(`/announcements/${annId}/comments/${cid}`, { method: 'DELETE' });
        showToast('Comment deleted.');
        loadComments(annId);
      } catch (err) {
        showToast(err.message, 'error');
      }
    };

    loadAnnouncements();
  </script>

</body>
</html>
