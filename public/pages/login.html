<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRS — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__logo">
        <img
          src="../assets/logo.png"
          alt="RRS Logo"
          class="auth-card__logo-img"
          onerror="this.style.display='none'; this.nextSibling.style.display='flex';"
        />
        <div class="auth-card__logo-fallback" style="display:none; width:44px; height:44px; border-radius:50%; background:var(--color-primary); align-items:center; justify-content:center; font-weight:900; font-size:1rem; color:var(--color-navy);">RRS</div>
        RRS
      </div>

      <h1 class="auth-card__title">Login to your account</h1>

      <form id="login-form" novalidate>
        <div class="auth-form__group">
          <label class="auth-form__label" for="email">Email</label>
          <input class="auth-form__input" type="email" id="email" name="email" placeholder="Email" autocomplete="email" />
          <p class="auth-form__error-msg" id="email-error"></p>
        </div>
<div class="auth-form__group">
          <label class="auth-form__label" for="password">Password</label>
<div class="auth-form__password-wrapper">
          <input class="auth-form__input" type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" />
          <button type="button" class="auth-form__password-toggle" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
<svg viewBox="0 0 24 24"><line x1="6" y1="12" x2="18" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
          <p class="auth-form__error-msg" id="password-error"></p>
        </div>
        <div class="auth-form__forgot" style="text-align: right; margin-bottom: 1rem;">
          <a href="#" id="forgot-password-link" style="color: var(--color-primary); font-size: 0.9rem; text-decoration: none;">Forgot Password?</a>
        </div>

        <div style="text-align: center; margin-bottom: 1rem;">
        </div>
        <p class="auth-form__error-msg" id="form-error" style="margin-top:0.3rem;font-size:0.8rem;"></p>
        <button type="submit" class="auth-form__submit" id="submit-btn">
          Confirm
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        </button>
      </form>

      <!-- Forgot Password Modal -->
      <div class="modal-overlay" id="forgot-password-overlay">
        <div class="modal">
          <h2 class="modal__title">Reset Password</h2>
          <p class="modal__text" style="margin-bottom: 1.5rem;">Enter your email address and we'll send you a link to reset your password.</p>
          <form id="forgot-password-form" novalidate>
            <div class="auth-form__group">
              <label class="auth-form__label" for="forgot-email">Email</label>
              <input class="auth-form__input" type="email" id="forgot-email" name="email" placeholder="your@email.com" autocomplete="email" />
              <p class="auth-form__error-msg" id="forgot-email-error"></p>
            </div>
            <p class="auth-form__error-msg" id="forgot-form-error"></p>
            <div class="modal__actions">
              <button type="button" class="btn btn--outline" id="forgot-cancel">Cancel</button>
              <button type="submit" class="btn btn--primary">Send Reset Link</button>
            </div>
          </form>
        </div>
      </div>

      <div class="auth-card__footer">
        Not a User? <a href="/pages/signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="../js/utils.js"></script>
  <script>
    // Redirect if already logged in
    if (getUser()) window.location.href = '/pages/announcements.html';

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');

    function clearErrors() {
      document.querySelectorAll('.auth-form__error-msg').forEach(el => {
        el.textContent = '';
        el.classList.remove('auth-form__error-msg--visible');
      });
      document.querySelectorAll('.auth-form__input').forEach(el => el.classList.remove('auth-form__input--error'));
    }

    function showFieldError(fieldId, errorId, msg) {
      const field = document.getElementById(fieldId);
      const err = document.getElementById(errorId);
      field.classList.add('auth-form__input--error');
      err.textContent = msg;
      err.classList.add('auth-form__error-msg--visible');
    }

    function validateForm() {
      clearErrors();
      let valid = true;
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
        showFieldError('email', 'email-error', 'Please enter a valid email address.');
        valid = false;
      }
      if (!password) {
        showFieldError('password', 'password-error', 'Password is required.');
        valid = false;
      }
      return valid;
    }

    // Password toggle
    document.querySelectorAll('.auth-form__password-toggle').forEach(toggle => {
      const input = toggle.previousElementSibling;
      toggle.addEventListener('click', () => {
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
      });
    });

    // Login error handling restored

    function clearForgotErrors() {
      document.querySelectorAll('#forgot-password-form .auth-form__error-msg').forEach(el => {
        el.textContent = '';
        el.classList.remove('auth-form__error-msg--visible');
      });
      document.querySelectorAll('#forgot-password-form .auth-form__input').forEach(el => el.classList.remove('auth-form__input--error'));
    }

    function showForgotError(id, msg) {
      const err = document.getElementById(id);
      const input = document.getElementById('forgot-email');
      input.classList.add('auth-form__input--error');
      err.textContent = msg;
      err.classList.add('auth-form__error-msg--visible');
    }

    // Forgot Password Modal handlers
    const forgotOverlay = document.getElementById('forgot-password-overlay');
    const forgotForm = document.getElementById('forgot-password-form');
    const forgotEmail = document.getElementById('forgot-email');
    const forgotCancel = document.getElementById('forgot-cancel');
    const forgotLink = document.getElementById('forgot-password-link');

    // Open modal (prefill email)
    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      forgotEmail.value = emailInput.value; // Prefill from login form
      clearForgotErrors();
      forgotOverlay.classList.add('modal-overlay--visible');
    });

    // Close modal
    function closeForgotModal() {
      forgotOverlay.classList.remove('modal-overlay--visible');
      clearForgotErrors();
    }

    forgotCancel.addEventListener('click', closeForgotModal);
    forgotOverlay.addEventListener('click', (e) => {
      if (e.target === forgotOverlay) closeForgotModal();
    });

    // Forgot form validation
    function validateForgotForm() {
      clearForgotErrors();
      const email = forgotEmail.value.trim();
      if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
        showForgotError('forgot-email-error', 'Please enter a valid email.');
        return false;
      }
      return true;
    }

    // Submit forgot form
    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validateForgotForm()) return;

      const submitBtn = forgotForm.querySelector('button[type="submit"]');
      setLoading(submitBtn, true);

      try {
        await apiFetch('/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email: forgotEmail.value.trim() })
        });
        showToast('Reset link sent! Check your email inbox/spam.', 'success');
        closeForgotModal();
      } catch (err) {
        showForgotError('forgot-form-error', err.message);
      } finally {
        setLoading(submitBtn, false);
      }
    });

    form.addEventListener('submit', async (e) => {

      e.preventDefault();
      if (!validateForm()) return;
      setLoading(submitBtn, true);

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: emailInput.value.trim(), password: passwordInput.value })
        });
        setUser(data.user, data.token);
        window.location.href = '/pages/announcements.html';
      } catch (err) {
        const formErr = document.getElementById('form-error');
        formErr.textContent = err.message;
        formErr.classList.add('auth-form__error-msg--visible');
        setLoading(submitBtn, false);
      }
    });
  </script>
</body>
</html>
