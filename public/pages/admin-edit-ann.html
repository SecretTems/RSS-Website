<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Announcement</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body style="background:var(--color-navy);color:var(--color-white);font-family:'DM Sans',sans-serif;">
  <div style="max-width:600px;margin:4rem auto;padding:2rem;background:var(--color-navy-light);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);">
    <h2 style="font-family:'Playfair Display';font-size:1.5rem;color:var(--color-primary);margin-bottom:1.5rem;text-align:center;">Edit Announcement</h2>
    <form id="edit-ann-form" style="display:grid;gap:1.5rem;">
      <div>
        <label style="display:block;margin-bottom:0.5rem;font-weight:600;">Title</label>
        <input id="edit-ann-title" style="width:100%;padding:0.75rem;border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);background:rgba(255,255,255,0.1);color:var(--color-white);font-size:1rem;" required maxlength="150" />
      </div>
      <div>
        <label style="display:block;margin-bottom:0.5rem;font-weight:600;">Content</label>
        <textarea id="edit-ann-content" rows="6" style="width:100%;padding:0.75rem;border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);background:rgba(255,255,255,0.1);color:var(--color-white);font-size:1rem;font-family:inherit;" required maxlength="2000"></textarea>
      </div>
      <div style="display:flex;gap:1rem;justify-content:flex-end;">
        <button type="button" id="cancel-btn" class="btn btn--outline" style="padding:0.65rem 1.4rem;">Cancel</button>
        <button type="submit" class="btn btn--primary" style="padding:0.65rem 1.4rem;">Save Changes</button>
      </div>
    </form>
  </div>

  <div id="toast-container" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:0.6rem;"></div>

  <script src="../js/utils.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const annId = urlParams.get('id');
    if (!annId) {
      alert('No announcement ID');
      window.close();
    }

    let editingAnn = null;

    // Load announcement
    async function loadAnn() {
      try {
        const res = await apiFetch(`/announcements`);
        editingAnn = res.data.find(a => a._id === annId);
        if (!editingAnn) {
          alert('Announcement not found');
          window.close();
        }
        document.getElementById('edit-ann-title').value = editingAnn.title;
        document.getElementById('edit-ann-content').value = editingAnn.content;
      } catch (err) {
        alert('Failed to load: ' + err.message);
        window.close();
      }
    }

    // Submit
    document.getElementById('edit-ann-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        title: document.getElementById('edit-ann-title').value.trim(),
        content: document.getElementById('edit-ann-content').value.trim()
      };
      if (!data.title || !data.content) return alert('Fill all fields');
      try {
        await apiFetch(`/announcements/${annId}`, {
          method: 'PUT',
          body: JSON.stringify(data)
        });
        alert('Updated!');
        window.close();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });

    // Cancel
    document.getElementById('cancel-btn').onclick = () => window.close();

    loadAnn();
  </script>
